<!DOCTYPE html>
<html>
<head>
    <title>Student Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        .header {
      background-color: #002d72;
      padding: 20px;
      text-align: center;
      border-bottom: 5px solid #007bff;
    }

</style>

</head>
<body class="bg-light">

<div class="container mt-5">

       <div class="header">
    <img src="/static/csit_logo.png" alt="CSIT Department Logo">
  </div>

    <h2 class="mb-4">Enter Student Unique Enrolment ID</h2>
    <form action="/student" method="get" class="row g-3">
        <div class="col-md-6">
            <input type="text" name="id" class="form-control" placeholder="Enrolment ID">
        </div>
        <div class="col-md-6">
            <input type="submit" value="Fetch" class="btn btn-success">
        </div>
    </form>
</div>
</body>
</html>
